<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Gear Log</title>
  <script defer src="/_vercel/insights/script.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #F7F4EE;
      --bg-alt:    #EDEAE2;
      --text:      #1A1A1A;
      --muted:     #6B6560;
      --accent:    #7C5C3A;
      --accent-lt: #A67C5B;
      --border:    #D8D3C8;
      --disp:      'Instrument Serif', Georgia, serif;
      --mono:      'DM Mono', 'Courier New', monospace;
      --body:      'Inter', system-ui, sans-serif;
      --max:       720px;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--body); line-height: 1.6; min-height: 100vh; }

    /* Header */
    .hdr { max-width: var(--max); margin: 0 auto; padding: 28px 24px 18px; display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .hdr-name { font-family: var(--disp); font-size: 26px; font-style: italic; cursor: pointer; }
    .hdr-nav { display: flex; gap: 20px; }
    .hdr-link { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; }
    .hdr-link:hover, .hdr-link.active { color: var(--accent); }

    /* Top Shots — Hero Chiclets */
    .hero-section { max-width: var(--max); margin: 0 auto; padding: 28px 24px 0; border-bottom: 1px solid var(--border); }
    .hero-eyebrow { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .hero-dot { width: 7px; height: 7px; border-radius: 50%; background: #d44; animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }
    .hero-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .hero-date { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }
    .hero-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); }
    .hero-card { background: var(--bg-alt); cursor: pointer; display: flex; flex-direction: column; text-align: center; transition: background .12s; overflow: hidden; }
    .hero-card:hover { background: var(--bg); }
    .hero-img-box { width: 100%; aspect-ratio: 4/3; flex-shrink: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; opacity: .7; overflow: hidden; }
    .hero-img-box.has-img { background: var(--bg); opacity: 1; }
    .hero-img-box.has-img img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; padding: 20px 16px; filter: grayscale(1); transition: filter .3s; }
    .hero-card:hover .hero-img-box.has-img img { filter: grayscale(0); }
    .hero-card-body { padding: 12px 12px 16px; display: flex; flex-direction: column; align-items: center; flex: 1; }
    .hero-rank { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--accent); align-self: flex-start; margin-bottom: 8px; }
    .hero-club { font-family: var(--disp); font-size: 13px; line-height: 1.25; margin-bottom: 4px; }
    .hero-player { font-family: var(--mono); font-size: 9px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .hero-event { font-family: var(--mono); font-size: 9px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); line-height: 1.4; }
    @media(max-width: 580px) {
      .hero-grid { grid-template-columns: 1fr; }
      .hero-card { flex-direction: row; text-align: left; }
      .hero-img-box { width: 90px; height: 90px; flex-shrink: 0; }
      .hero-card-body { padding: 14px 16px; align-items: flex-start; }
      .hero-rank { margin-bottom: 2px; }
    }

    /* Home sections */
    .home-section { max-width: var(--max); margin: 0 auto; padding: 36px 24px 40px; border-bottom: 1px solid var(--border); }
    .sec-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .sec-title { font-family: var(--disp); font-size: 22px; margin-bottom: 24px; }

    /* Courses */
    .course-group { margin-bottom: 24px; }
    .course-name { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding-bottom: 7px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .course-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--bg-alt); cursor: pointer; }
    .course-row:last-child { border-bottom: none; }
    .course-row:hover { opacity: .7; }
    .course-row-player { font-family: var(--disp); font-size: 16px; }
    .course-row-shot { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .course-row-event { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; white-space: nowrap; flex-shrink: 0; }

    /* Course chooser */
    .course-chooser { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 20px; padding-bottom: 2px; }
    .course-chooser::-webkit-scrollbar { display: none; }
    .course-chip { padding: 5px 13px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: border-color .12s, color .12s, background .12s; }
    .course-chip:hover { border-color: var(--accent-lt); color: var(--accent); }
    .course-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Lore */
    .lore-desc { font-size: 14px; color: var(--muted); font-style: italic; margin-bottom: 20px; }
    .lore-cards { display: flex; flex-direction: column; gap: 12px; }
    .lore-card { border: 1.5px dashed var(--border); padding: 16px 18px; cursor: pointer; text-align: left; background: none; width: 100%; transition: border-color .15s; }
    .lore-card:hover { border-color: var(--accent-lt); }
    .lore-card-player { font-family: var(--disp); font-size: 18px; margin-bottom: 2px; }
    .lore-card-event { font-family: var(--mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .lore-card-shot { font-size: 13px; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
    .lore-card-note { font-family: var(--disp); font-size: 15px; color: var(--accent); }

    /* Era */
    .era-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); }
    .era-panel { background: var(--bg); padding: 18px 16px; }
    .era-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
    .era-dates { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 14px; }
    .era-entry { display: block; font-family: var(--disp); font-size: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); cursor: pointer; color: var(--text); background: none; border-left: none; border-right: none; border-top: none; text-align: left; width: 100%; }
    .era-entry:last-child { border-bottom: none; }
    .era-entry:hover { color: var(--accent); }
    @media(max-width:520px){ .era-grid{grid-template-columns:1fr} }

    /* Browse */
    .browse-bar { max-width: var(--max); margin: 0 auto; padding: 14px 24px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .browse-bar::-webkit-scrollbar { display: none; }
    .cat-btn { display: flex; align-items: center; gap: 5px; padding: 5px 11px; border: 1px solid var(--border); border-radius: 3px; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
    .cat-btn:hover { border-color: var(--accent-lt); color: var(--accent); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-btn svg { width: 13px; height: 13px; }
    .browse-list { max-width: var(--max); margin: 0 auto; padding: 0 24px 48px; }
    .browse-card { display: block; width: 100%; background: transparent; border: none; text-align: left; padding: 20px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .browse-card:first-child { border-top: 1px solid var(--border); margin-top: 24px; }
    .browse-card:hover .bc-inner { background: var(--bg-alt); margin: -12px; padding: 12px; }
    .bc-inner { border-radius: 2px; transition: all .12s; }
    .bc-player { font-family: var(--disp); font-size: 20px; margin-bottom: 3px; }
    .bc-event { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 10px; }
    .bc-shot { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
    .bc-note { font-family: var(--disp); font-size: 15px; color: var(--accent); }
    .empty { text-align: center; padding: 64px 24px; font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* Entry page */
    .ep { max-width: var(--max); margin: 0 auto; padding: 28px 24px 64px; }
    .back-btn { background: none; border: none; font-family: var(--mono); font-size: 11px; color: var(--muted); cursor: pointer; letter-spacing: .05em; text-transform: uppercase; padding: 0; margin-bottom: 28px; display: flex; align-items: center; gap: 5px; }
    .back-btn:hover { color: var(--accent); }
    .back-btn svg { width: 14px; height: 14px; }

    /* Club hero */
    .club-hero { background: var(--bg-alt); margin-bottom: 28px; }
    .club-hero-placeholder { height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .club-hero-placeholder svg { color: var(--accent); opacity: .55; }
    .club-hero-name { font-family: var(--disp); font-size: 22px; }
    .club-hero-cat { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .club-hero-footer { font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 10px 16px; border-top: 1px solid var(--border); text-align: right; }
    .club-hero-img { width: 100%; max-height: 380px; object-fit: contain; padding: 40px 56px 32px; display: block; mix-blend-mode: multiply; filter: grayscale(1); transition: filter .4s; }
    .club-hero:hover .club-hero-img { filter: grayscale(0); }

    .ep-tier-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .ep-tier-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .ep-tier-label { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
    .ep-player { font-family: var(--disp); font-size: clamp(28px,5vw,42px); line-height: 1.05; margin-bottom: 6px; }
    .ep-event { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 32px; }
    .ep-sec { margin-bottom: 26px; }
    .ep-sec-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding-bottom: 7px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .ep-conditions { background: var(--bg-alt); padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: var(--muted); line-height: 1.7; }
    .ep-conditions .stakes { margin-top: 6px; color: var(--text); }
    .ep-shot { font-size: 17px; line-height: 1.65; color: var(--text); }
    .ep-gear-item { padding-left: 14px; border-left: 2px solid var(--border); margin-bottom: 14px; }
    .ep-gear-cat { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
    .ep-gear-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
    .ep-gear-note { font-size: 13px; color: var(--muted); }
    .ep-gear-link { display: inline-block; margin-top: 5px; font-family: var(--mono); font-size: 11px; color: var(--accent); text-decoration: none; }
    .ep-gear-link:hover { text-decoration: underline; }
    .note-blk { background: var(--bg-alt); border-left: 3px solid var(--accent); padding: 18px 22px; }
    .note-blk-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    .note-blk-text { font-family: var(--disp); font-size: 22px; line-height: 1.45; }

    /* My Bag — Edit Form */
    .bag-section { max-width: var(--max); margin: 0 auto; padding: 28px 24px 48px; }
    .bag-intro { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .bag-category-block { margin-bottom: 28px; }
    .bag-cat-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 7px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .bag-cat-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .bag-add-btn { font-family: var(--mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
    .bag-add-btn:hover { text-decoration: underline; }
    .bag-club-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; }
    .bag-club-row select, .bag-club-row input { font-family: var(--body); font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 2px; }
    .bag-club-row select { min-width: 140px; }
    .bag-club-row input { flex: 1; min-width: 0; }
    .bag-club-row select:focus, .bag-club-row input:focus { outline: none; border-color: var(--accent); }
    .bag-row-preview { display: none; align-items: center; gap: 12px; width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; margin-top: 2px; }
    .bag-row-preview.visible { display: flex; }
    .bag-row-preview img { width: 72px; height: 72px; object-fit: contain; flex-shrink: 0; mix-blend-mode: multiply; filter: grayscale(1); }
    .bag-row-preview-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .04em; }
    .bag-remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 7px 4px; line-height: 1; }
    .bag-remove-btn:hover { color: var(--text); }
    .bag-save-bar { display: flex; gap: 12px; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
    .bag-save-btn { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; padding: 8px 20px; background: var(--accent); color: #fff; border: none; cursor: pointer; border-radius: 2px; }
    .bag-save-btn:hover { opacity: .85; }
    .bag-clear-btn { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; }
    .bag-clear-btn:hover { color: var(--text); }

    /* My Bag — Hero Carousel */
    .bag-hero { max-width: var(--max); margin: 0 auto; padding: 32px 24px 0; }
    .bag-hero-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    .bag-hero-title { font-family: var(--disp); font-size: 28px; }
    .bag-edit-link { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
    .bag-edit-link:hover { text-decoration: underline; }
    .bag-hero-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .04em; margin-bottom: 20px; }

    /* Featured club — unified hero panel */
    .bag-featured { display: flex; gap: 0; background: var(--bg-alt); margin-bottom: 1px; min-height: 260px; border-bottom: 1px solid var(--border); }
    .bag-featured-img { flex: 0 0 55%; display: flex; align-items: center; justify-content: center; padding: 28px 16px 28px 28px; overflow: hidden; background: var(--bg-alt); }
    .bag-featured-img img { max-width: 100%; max-height: 260px; object-fit: contain; mix-blend-mode: multiply; filter: grayscale(1); transition: filter .3s; }
    .bag-featured-img img:hover { filter: grayscale(0); }
    .bag-featured-img .bag-featured-icon { color: var(--accent); opacity: .25; }
    .bag-featured-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 28px 28px 28px 12px; border-left: 1px solid var(--border); }
    .bag-featured-cat { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    .bag-featured-model { font-family: var(--disp); font-size: 28px; line-height: 1.1; margin-bottom: 4px; }
    .bag-featured-brand { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
    .bag-featured-stats { font-family: var(--mono); font-size: 10px; color: var(--muted); line-height: 2; }
    .bag-featured-stats strong { color: var(--text); font-weight: 500; }
    @media(max-width:520px) {
      .bag-featured { flex-direction: column; min-height: auto; }
      .bag-featured-img { flex: none; height: 200px; padding: 20px; border-left: none; border-bottom: 1px solid var(--border); }
      .bag-featured-info { padding: 20px 24px; border-left: none; }
    }

    /* Carousel strip — thumbnail selectors below featured */
    .bag-carousel { display: flex; gap: 1px; background: var(--border); overflow-x: auto; scrollbar-width: none; }
    .bag-carousel::-webkit-scrollbar { display: none; }
    .bag-club-card { background: var(--bg); padding: 10px 12px; min-width: 100px; flex: 1; cursor: pointer; text-align: center; transition: background .12s, opacity .12s; position: relative; opacity: .6; }
    .bag-club-card:hover { opacity: .85; background: var(--bg-alt); }
    .bag-club-card.active { background: var(--bg-alt); opacity: 1; }
    .bag-club-card.active::after { content: ''; position: absolute; top: 0; left: 12px; right: 12px; height: 2px; background: var(--accent); }
    .bag-club-img { width: 56px; height: 56px; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; }
    .bag-club-img img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; filter: grayscale(1); }
    .bag-club-model { font-family: var(--disp); font-size: 11px; line-height: 1.2; margin-bottom: 2px; }
    .bag-club-brand { font-family: var(--mono); font-size: 8px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    @media(max-width:580px) {
      .bag-club-card { min-width: 90px; flex: none; }
    }

    /* My Bag — Results */
    .bag-results { max-width: var(--max); margin: 0 auto; padding: 24px 24px 48px; }
    .bag-results-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
    .bag-active-club { font-family: var(--disp); font-size: 22px; }
    .bag-filter-bar { display: flex; gap: 6px; }
    .bag-filter-btn { padding: 5px 13px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; transition: all .12s; }
    .bag-filter-btn:hover { border-color: var(--accent-lt); color: var(--accent); }
    .bag-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Moment Cards — outcome-first layout */
    .bag-moment { padding: 18px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .1s; }
    .bag-moment:first-child { border-top: 1px solid var(--border); }
    .bag-moment:hover { opacity: .8; }
    .bag-moment-outcome { font-family: var(--disp); font-size: 19px; line-height: 1.3; margin-bottom: 6px; }
    .bag-moment-meta { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .bag-moment-player { font-family: var(--mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; font-weight: 500; color: var(--text); }
    .bag-moment-event { font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--muted); }
    .bag-moment-club-tag { font-family: var(--mono); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }
    .bag-moment-club-tag.exact { background: var(--accent); color: #fff; }
    .bag-moment-club-tag.brand { background: var(--bg-alt); border: 1px solid var(--border); color: var(--accent); }
    .bag-moment-club-tag.category { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .bag-moment-context { font-size: 13px; color: var(--muted); line-height: 1.55; }
    .bag-moment-used { font-family: var(--mono); font-size: 10px; color: var(--accent); margin-top: 6px; }

    .bag-tier-divider { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin: 24px 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
    .bag-empty-state { text-align: center; padding: 48px 0; color: var(--muted); }
    .bag-empty-state p { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 6px; }

    /* Add a Moment form */
    .moment-form { max-width: var(--max); margin: 0 auto; padding: 28px 24px 48px; }
    .moment-form-field { margin-bottom: 18px; }
    .moment-form-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
    .moment-form-input { width: 100%; font-family: var(--body); font-size: 14px; padding: 10px 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 2px; }
    .moment-form-input:focus { outline: none; border-color: var(--accent); }
    .moment-form-textarea { width: 100%; font-family: var(--body); font-size: 14px; padding: 10px 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 2px; min-height: 100px; resize: vertical; line-height: 1.6; }
    .moment-form-textarea:focus { outline: none; border-color: var(--accent); }
    .moment-form-club { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg-alt); border: 1px solid var(--border); border-radius: 2px; }
    .moment-form-club-icon { color: var(--accent); }
    .moment-form-club-name { font-family: var(--disp); font-size: 16px; }
    .moment-form-club-cat { font-family: var(--mono); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .moment-form-hint { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }
    .moment-form-actions { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
    .moment-form-submit { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; padding: 10px 24px; background: var(--accent); color: #fff; border: none; cursor: pointer; border-radius: 2px; }
    .moment-form-submit:hover { opacity: .85; }
    .moment-form-cancel { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: pointer; }
    .moment-form-cancel:hover { color: var(--text); }

    /* Most Lethal Clubs */
    .lethal-section { max-width: var(--max); margin: 0 auto; padding: 36px 24px 40px; border-bottom: 1px solid var(--border); background: var(--bg); }
    .lethal-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1px; background: var(--border); margin-top: 24px; }
    .lethal-card { background: var(--bg); padding: 20px 18px; cursor: pointer; transition: background .12s; }
    .lethal-card:hover { background: var(--bg-alt); }
    .lethal-icon { color: var(--accent); opacity: .7; margin-bottom: 10px; }
    .lethal-club { font-family: var(--disp); font-size: 17px; line-height: 1.2; margin-bottom: 4px; }
    .lethal-player { font-family: var(--mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .lethal-note { font-size: 12px; color: var(--muted); line-height: 1.5; }
    @media(max-width:480px){ .lethal-grid { grid-template-columns: 1fr; } }

    .footer-bar { max-width: var(--max); margin: 0 auto; padding: 28px 24px; text-align: center; }
    .footer-btn { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: pointer; }
    .footer-btn:hover { color: var(--accent); }

// ─── Bag Storage ─────────────────────────────────────────────────────────────
function loadBag() {
  try { return JSON.parse(localStorage.getItem('gearlog_mybag')) || []; }
  catch { return []; }
}
function saveBag(bag) {
  localStorage.setItem('gearlog_mybag', JSON.stringify(bag));
}
function hasBag() { return loadBag().length > 0; }

// ─── Matching Engine ─────────────────────────────────────────────────────────
function normalizeStr(s) { return (s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

function matchBag(bag, filterMode) {
  // Returns results grouped by user club
  const results = [];
  bag.forEach(club => {
    const clubResult = {club, tiers:{exact:[], brand:[], category:[]}};
    const cBrand = normalizeStr(club.brand);
    const cModel = normalizeStr(club.model);
    // Map bag categories to entry gearCategories
    const catMatch = club.category === 'fairway-wood' ? 'driver' : club.category;

    ENTRIES.forEach(entry => {
      entry.gear.forEach(g => {
        const gBrand = normalizeStr(g.brand);
        const gModel = normalizeStr(g.model);
        const gCat = g.category;
        // Category must be relevant
        const catRelevant = gCat === club.category || (club.category === 'fairway-wood' && gCat === 'driver') || (club.category === 'driver' && gCat === 'driver');
        if (!catRelevant && !entry.gearCategories.includes(catMatch)) return;

        if (cBrand && gBrand && cBrand === gBrand && cModel && gModel && gModel.includes(cModel)) {
          if (!clubResult.tiers.exact.find(x=>x.id===entry.id))
            clubResult.tiers.exact.push(entry);
        } else if (cBrand && gBrand && cBrand === gBrand && catRelevant) {
          if (!clubResult.tiers.brand.find(x=>x.id===entry.id) && !clubResult.tiers.exact.find(x=>x.id===entry.id))
            clubResult.tiers.brand.push(entry);
        } else if (catRelevant || entry.gearCategories.includes(catMatch)) {
          if (!clubResult.tiers.category.find(x=>x.id===entry.id) && !clubResult.tiers.exact.find(x=>x.id===entry.id) && !clubResult.tiers.brand.find(x=>x.id===entry.id))
            clubResult.tiers.category.push(entry);
        }
      });
    });
    results.push(clubResult);
  });
  return results;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function clubHeroHTML(entry) {
  const g = entry.gear[0];
  if (!g) return '';
  // Check for image: first the entry's own clubImageUrl, then the CLUB_IMAGES lookup
  const entryImg = g.clubImageUrl || getClubImage(g.brand, g.model);
  const body = entryImg
    ? `<img class="club-hero-img" src="${esc(entryImg)}" alt="${esc(g.item)}">`
    : `<div class="club-hero-placeholder">
        ${icon(g.category, 48)}
        <div class="club-hero-name">${esc(g.item)}</div>
        <div class="club-hero-cat">${esc(g.category)}</div>
      </div>`;
  return `<div class="club-hero">
    ${body}

  </div>`;
}

function clubsOf2026HTML() {
  const SEASON_YEAR = 2026;
  // Collect all gear items from 2026 entries, grouped by club model
  const clubMap = {};
  ENTRIES.filter(e => yr(e.event.date) === SEASON_YEAR && e.tier !== 'PERSONAL').forEach(e => {
    e.gear.forEach(g => {
      if (!clubMap[g.item]) clubMap[g.item] = { g, appearances: [] };
      clubMap[g.item].appearances.push(e);
    });
  });
  const clubs = Object.values(clubMap).sort((a,b) => b.appearances.length - a.appearances.length);
  if (clubs.length === 0) return '';

  const cards = clubs.map(({g, appearances}) => {
    const countLabel = appearances.length > 1
      ? `${appearances.length} moments this season`
      : `${esc(appearances[0].event.name)}`;
    const players = appearances.map(e => esc(e.player.name)).join(', ');
    // clicking goes to the first entry that features this club
    return `<div class="lethal-card" data-entry="${appearances[0].id}">
      <div class="lethal-icon">${icon(g.category, 24)}</div>
      <div class="lethal-club">${esc(g.item)}</div>
      <div class="lethal-player">${players}</div>
      <div class="lethal-note">${countLabel}</div>
    </div>`;
  }).join('');

  return `<div class="lethal-section">
    <div class="sec-eyebrow">Equipment</div>
    <div class="sec-title">Clubs of ${SEASON_YEAR}</div>
    <div class="lethal-grid">${cards}</div>
  </div>`;
}

      </div>
    </div>
    <div class="ep-sec">
      <div class="ep-sec-label">The Shot</div>
      <p class="ep-shot">${esc(entry.shot)}</p>
    </div>
    <div class="ep-sec">
      <div class="ep-sec-label">What they used</div>
      ${gearItems}
    </div>
    <div class="note-blk">
      <div class="note-blk-label">The note</div>
      <div class="note-blk-text">${esc(entry.note)}</div>
    </div>
  </div>`;
}

// ─── My Bag Views ────────────────────────────────────────────────────────────
function modelsForBrand(brand, category) {
  const b = CLUB_DB[brand];
  if (!b) return [];
  return b[category] || [];
}

function bagEditHTML() {
  const bag = loadBag();
  const catClubs = {};
  BAG_CATEGORIES.forEach(c => { catClubs[c.id] = []; });
  bag.forEach(club => {
    if (catClubs[club.category]) catClubs[club.category].push(club);
  });
  BAG_CATEGORIES.forEach(c => {
    if (catClubs[c.id].length === 0 && c.defaultSlots > 0) {
      for (let i=0; i<c.defaultSlots; i++) catClubs[c.id].push({category:c.id, brand:'', model:''});
    }
  });

  const sections = BAG_CATEGORIES.map(cat => {
    const clubs = catClubs[cat.id];
    const rows = clubs.map((club, i) => {
      const models = modelsForBrand(club.brand, cat.id);
      const brandOpts = BRAND_LIST.map(b=>`<option value="${esc(b)}"${club.brand===b?' selected':''}>${esc(b)}</option>`).join('');
      const modelField = models.length > 0
        ? `<select class="bag-model-sel" data-bag-cat="${cat.id}" data-bag-idx="${i}">
            <option value="">Model...</option>
            ${models.map(m=>`<option value="${esc(m)}"${club.model===m?' selected':''}>${esc(m)}</option>`).join('')}
            <option value="__other"${club.model && !models.includes(club.model)?` selected`:``}>Other...</option>
          </select>${club.model && !models.includes(club.model)?`<input class="bag-model-input bag-model-other" placeholder="Model..." value="${esc(club.model)}" data-bag-cat="${cat.id}" data-bag-idx="${i}">`:``}`
        : `<input class="bag-model-input" placeholder="Model..." value="${esc(club.model||'')}" data-bag-cat="${cat.id}" data-bag-idx="${i}">`;

      const existingImg = club.brand && club.model ? getClubImage(club.brand, club.model) : null;
      const previewHTML = existingImg
        ? `<div class="bag-row-preview visible" data-bag-preview="${cat.id}-${i}">
            <img src="${esc(existingImg)}" alt="${esc(club.model)}">
            <span class="bag-row-preview-label">${esc(club.brand)} ${esc(club.model)}</span>
          </div>`
        : `<div class="bag-row-preview" data-bag-preview="${cat.id}-${i}"></div>`;

      return `<div class="bag-club-row" data-bag-cat="${cat.id}" data-bag-idx="${i}">
        <select class="bag-brand-sel" data-bag-cat="${cat.id}" data-bag-idx="${i}">
          <option value="">Brand...</option>
          ${brandOpts}
          <option value="__other">Other...</option>
        </select>
        ${modelField}
        ${clubs.length > 1 || cat.defaultSlots === 0
          ? `<button class="bag-remove-btn" data-bag-remove="${cat.id}-${i}">&times;</button>`
          : `<button class="bag-remove-btn" style="visibility:hidden">&times;</button>`}
        ${previewHTML}
      </div>`;
    }).join('');

    return `<div class="bag-category-block">
      <div class="bag-cat-header">
        <span class="bag-cat-label">${icon(cat.id==='fairway-wood'?'driver':cat.id)} ${cat.label}</span>
        <button class="bag-add-btn" data-bag-add="${cat.id}">+ Add</button>
      </div>
      ${rows}
    </div>`;
  }).join('');

  return `<div class="bag-section">
    <div class="sec-eyebrow">Your Equipment</div>
    <div class="sec-title">Define Your Bag</div>
    <p class="bag-intro">Enter what you carry. Brand and model — that's it. We'll show you what happened when those clubs showed up under pressure.</p>
    ${sections}
    <div class="bag-save-bar">
      <button class="bag-save-btn" data-action="save-bag">Save Bag</button>
      <button class="bag-clear-btn" data-action="clear-bag">Clear</button>
      <span class="bag-saved-msg" id="bag-saved-msg">Saved</span>
    </div>
  </div>`;
}

function bagResultsHTML() {
  const bag = loadBag();
  const filter = state.bagFilter;
  const activeIdx = Math.min(state.bagActiveClub, bag.length - 1);
  const activeClub = bag[activeIdx];
  const results = matchBag(bag, filter);
  const activeResult = results[activeIdx];

  // Featured club — large display
  const featImg = getClubImage(activeClub.brand, activeClub.model);
  const featCatIcon = activeClub.category === 'fairway-wood' ? 'driver' : activeClub.category;
  const featImgHTML = featImg
    ? `<img src="${esc(featImg)}" alt="${esc(activeClub.brand)} ${esc(activeClub.model)}">`
    : `<div class="bag-featured-icon">${icon(featCatIcon, 64)}</div>`;

  // Count matches for this club
  const activeExact = activeResult ? activeResult.tiers.exact.length : 0;
  const activeBrand = activeResult ? activeResult.tiers.brand.length : 0;
  const totalMoments = activeExact + activeBrand;

  const featuredHTML = `<div class="bag-featured">
    <div class="bag-featured-img">${featImgHTML}</div>
    <div class="bag-featured-info">
      <div class="bag-featured-cat">${esc(activeClub.category.replace('-',' '))}</div>
      <div class="bag-featured-model">${esc(activeClub.model)}</div>
      <div class="bag-featured-brand">${esc(activeClub.brand)}</div>
      <div class="bag-featured-stats">
        ${activeExact > 0 ? `<div><strong>${activeExact}</strong> exact match${activeExact!==1?'es':''} on tour</div>` : ''}
        ${activeBrand > 0 ? `<div><strong>${activeBrand}</strong> ${esc(activeClub.brand)} moment${activeBrand!==1?'s':''}</div>` : ''}
        ${totalMoments === 0 ? `<div>No tour moments yet</div>` : ''}
      </div>
    </div>
  </div>`;

  // Thumbnail strip — all clubs in the bag
  const carouselCards = bag.map((c, i) => {
    const catIcon = c.category === 'fairway-wood' ? 'driver' : c.category;
    const thumbImg = getClubImage(c.brand, c.model);
    const thumbHTML = thumbImg
      ? `<img src="${esc(thumbImg)}" alt="${esc(c.model)}">`
      : icon(catIcon, 22);
    return `<div class="bag-club-card${i===activeIdx?' active':''}" data-bag-club-idx="${i}">
      <div class="bag-club-img">${thumbHTML}</div>
      <div class="bag-club-model">${esc(c.model)}</div>
      <div class="bag-club-brand">${esc(c.brand)}</div>
    </div>`;
  }).join('');

  // Filter toggle — only Exact and Brand. No "All" — category-level matches
  // under a specific club heading break the connection.
  const filterBtns = ['exact','brand'].map(f =>
    `<button class="bag-filter-btn${filter===f?' active':''}" data-bag-filter="${f}">${f==='exact'?'Exact Match':'Brand'}</button>`
  ).join('');

  // Build moment cards for the active club
  let momentsHTML = '';
  if (activeResult) {
    const {tiers} = activeResult;

    // Collect visible moments — only exact and brand tiers
    const moments = [];
    tiers.exact.forEach(e => moments.push({e, tier:'exact'}));
    if (filter === 'brand') {
      tiers.brand.forEach(e => moments.push({e, tier:'brand'}));
    }

    if (moments.length > 0) {
      momentsHTML = moments.map(({e, tier}) => {
        // Find which gear item in this entry matched
        const matchedGear = e.gear.find(g => {
          const gB = normalizeStr(g.brand), cB = normalizeStr(activeClub.brand);
          const gM = normalizeStr(g.model), cM = normalizeStr(activeClub.model);
          if (tier === 'exact') return gB === cB && gM && cM && gM.includes(cM);
          if (tier === 'brand') return gB === cB;
          return true;
        }) || e.gear[0];

        // Tier badge
        const tierLabel = tier === 'exact' ? 'Your club'
          : tier === 'brand' ? esc(activeClub.brand)
          : esc(BAG_CATEGORIES.find(c=>c.id===activeClub.category)?.label || activeClub.category);

        // "Used with" line — what specific club did the pro use
        const usedLine = tier === 'exact'
          ? `Used your ${esc(activeClub.brand)} ${esc(activeClub.model)}`
          : `Used ${esc(matchedGear.item)}`;

        // Extract a punchy outcome from the shot text (first sentence or first ~60 chars)
        const shotText = e.shot || '';
        const firstSentence = shotText.split(/\.\s/)[0] + (shotText.includes('.') ? '.' : '');
        const outcome = firstSentence.length > 80 ? firstSentence.slice(0,77)+'...' : firstSentence;

        // Context is the rest
        const rest = shotText.slice(firstSentence.length).trim();
        const context = rest.length > 140 ? rest.slice(0,137)+'...' : rest;

        return `<div class="bag-moment" data-entry="${e.id}">
          <div class="bag-moment-outcome">${esc(outcome)}</div>
          <div class="bag-moment-meta">
            <span class="bag-moment-player">${esc(e.player.name)}</span>
            <span class="bag-moment-event">${esc(e.event.name)}${e.event.round?' — '+esc(e.event.round):''}</span>
            <span class="bag-moment-club-tag ${tier}">${tierLabel}</span>
          </div>
          ${context ? `<div class="bag-moment-context">${esc(context)}</div>` : ''}
          <div class="bag-moment-used">${usedLine}</div>
        </div>`;
      }).join('');
    } else {
      const clubName = `${esc(activeClub.brand)} ${esc(activeClub.model)}`;
      const broaden = filter === 'exact'
        ? `<button class="bag-filter-btn" data-bag-filter="brand" style="margin-top:12px;">See all ${esc(activeClub.brand)} moments</button>`
        : '';
      momentsHTML = `<div class="bag-empty-state">
        <div style="margin-bottom:16px;">${icon(activeClub.category === 'fairway-wood' ? 'driver' : activeClub.category, 36)}</div>
        <p>No ${filter==='exact' ? clubName : esc(activeClub.brand) + ' ' + esc(activeClub.category)} moments yet.</p>
        ${broaden}
        <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);">
          <p style="margin-bottom:8px;">You play this club. What's the moment?</p>
          <button class="bag-save-btn" data-action="add-moment" style="margin-top:6px;">Add a Moment</button>
        </div>
      </div>`;
    }
  }

  return `<div class="bag-hero">
    <div class="bag-hero-header">
      <div class="bag-hero-title">My Bag</div>
      <button class="bag-edit-link" data-action="mybag-edit">Edit Bag</button>
    </div>
    <div class="bag-hero-sub">${bag.length} club${bag.length!==1?'s':''} in your bag</div>
    ${featuredHTML}
    <div class="bag-carousel">${carouselCards}</div>
  </div>
  <div class="bag-results">
    <div class="bag-results-header">
      <div class="bag-active-club">${esc(activeClub.brand)} ${esc(activeClub.model)}</div>
      <div class="bag-filter-bar">${filterBtns}</div>
    </div>
    ${momentsHTML}
  </div>`;
}

}

function addMomentHTML() {
  const bag = loadBag();
  const activeClub = bag[state.bagActiveClub] || bag[0];
  if (!activeClub) return bagEditHTML();

  const catIcon = activeClub.category === 'fairway-wood' ? 'driver' : activeClub.category;

  return `<div class="moment-form">
    <button class="back-btn" data-action="mybag">${ICONS.back} Back to My Bag</button>
    <div class="sec-eyebrow" style="margin-top:16px;">New Moment</div>
    <div class="sec-title">What happened with your ${esc(activeClub.model)}?</div>

    <div class="moment-form-field">
      <label class="moment-form-label">Club</label>
      <div class="moment-form-club">
        <div class="moment-form-club-icon">${icon(catIcon, 20)}</div>
        <div>
          <div class="moment-form-club-name">${esc(activeClub.brand)} ${esc(activeClub.model)}</div>
          <div class="moment-form-club-cat">${esc(activeClub.category.replace('-',' '))}</div>
        </div>
      </div>
    </div>

    <div class="moment-form-field">
      <label class="moment-form-label">Course</label>
      <input class="moment-form-input" id="moment-course" placeholder="Where did you play?">
    </div>

    <div class="moment-form-field">
      <label class="moment-form-label">Date</label>
      <input class="moment-form-input" id="moment-date" type="date" value="${new Date().toISOString().slice(0,10)}">
    </div>

    <div class="moment-form-field">
      <label class="moment-form-label">What happened?</label>
      <textarea class="moment-form-textarea" id="moment-shot" placeholder="The shot, the hole, the decision. What did you do with this club?"></textarea>
      <div class="moment-form-hint">2-4 sentences. Be specific — the hole, the yardage, what you were thinking.</div>
    </div>

    <div class="moment-form-field">

      <input class="moment-form-input" id="moment-note" placeholder="What held. What mattered.">
      <div class="moment-form-hint">One line. The feeling after the round.</div>
    </div>

    <div class="moment-form-actions">
      <button class="moment-form-submit" data-action="submit-moment">Save Moment</button>
      <button class="moment-form-cancel" data-action="mybag">Cancel</button>
    </div>
  </div>`;
}

function mybagHTML() {
  if (state.view === 'add-moment') return addMomentHTML();
  if (state.view === 'mybag-edit' || !hasBag()) return bagEditHTML();
  return bagResultsHTML();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const entry = ENTRIES.find(e=>e.id===state.entryId);
  let body = '';
  if (state.view==='entry' && entry) body = entryHTML(entry);
  else if (state.view==='mybag' || state.view==='mybag-edit' || state.view==='add-moment') body = mybagHTML();
  else if (state.view==='browse') body = browseHTML();
  else body = homeHTML();

  document.getElementById('app').innerHTML = headerHTML() + body;
  attachEvents();
  attachBagEvents();
}

function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const a = el.dataset.action;
      if (a==='home')      setState({view:'home',   entryId:null});
      if (a==='browse')    setState({view:'browse',  entryId:null});
      if (a==='back')      setState({view:'home',   entryId:null});
      if (a==='mybag')     setState({view:'mybag',   entryId:null});
      if (a==='mybag-edit') setState({view:'mybag-edit', entryId:null});
      if (a==='add-moment') setState({view:'add-moment', entryId:null});
      if (a==='submit-moment') submitMoment();
      if (a==='save-bag')  saveBagFromForm();
      if (a==='clear-bag') { saveBag([]); setState({view:'mybag-edit'}); }
    });
  });
  document.querySelectorAll('[data-entry]').forEach(el=>{
    el.addEventListener('click', ()=>setState({view:'entry', entryId:el.dataset.entry}));
  });
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.addEventListener('click', ()=>setState({browseCat:el.dataset.cat}));
  });
  document.querySelectorAll('[data-course]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const sy = window.scrollY;
      state.browseCourse = el.dataset.course;
      render();
      window.scrollTo(0, sy);
    });
  });
  document.querySelectorAll('[data-bag-filter]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.bagFilter = el.dataset.bagFilter;
      render();
    });
  });
  document.querySelectorAll('[data-bag-club-idx]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.bagActiveClub = parseInt(el.dataset.bagClubIdx);
      render();
    });
  });
}

function updateRowPreview(el) {
  const row = el.closest('.bag-club-row');
  if (!row) return;
  const cat = row.dataset.bagCat;
  const idx = row.dataset.bagIdx;
  const brand = row.querySelector('.bag-brand-sel')?.value || '';
  const modelSel = row.querySelector('.bag-model-sel');
  const modelInp = row.querySelector('.bag-model-other') || row.querySelector('.bag-model-input');
  const model = (modelSel && modelSel.value && modelSel.value !== '__other')
    ? modelSel.value
    : (modelInp?.value || '');
  const preview = row.querySelector(`[data-bag-preview="${cat}-${idx}"]`);
  if (!preview) return;
  const img = getClubImage(brand, model);
  if (img && brand && model) {
    preview.innerHTML = `<img src="${esc(img)}" alt="${esc(model)}"><span class="bag-row-preview-label">${esc(brand)} ${esc(model)}</span>`;
    preview.classList.add('visible');
  } else {
    preview.innerHTML = '';
    preview.classList.remove('visible');
  }
}

function attachBagEvents() {
  // Brand selector changes → re-render to update model options
  document.querySelectorAll('.bag-brand-sel').forEach(sel=>{
    sel.addEventListener('change', ()=>{
      // Save current form state first, then re-render
      saveBagFromFormSilent();
      render();
    });
  });
  // Model selector → "Other" triggers freeform; otherwise update live preview
  document.querySelectorAll('.bag-model-sel').forEach(sel=>{
    sel.addEventListener('change', ()=>{
      if (sel.value === '__other') {
        saveBagFromFormSilent();
        render();
      } else {
        updateRowPreview(sel);
      }
    });
  });

  // Model text input → update preview on input
  document.querySelectorAll('.bag-model-input').forEach(inp=>{
    inp.addEventListener('input', ()=>{ updateRowPreview(inp); });
  });
  // Add club buttons
  document.querySelectorAll('[data-bag-add]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = btn.dataset.bagAdd;
      const bag = readBagFromForm();
      bag.push({category:cat, brand:'', model:''});
      saveBag(bag);
      render();
    });
  });
  // Remove club buttons
  document.querySelectorAll('[data-bag-remove]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [cat, idx] = btn.dataset.bagRemove.split('-');
      const bag = readBagFromForm();
      // Find and remove the right one
      let count = 0;
      for (let i=0; i<bag.length; i++) {
        if (bag[i].category === cat) {
          if (count === parseInt(idx)) { bag.splice(i, 1); break; }
          count++;
        }
      }
      saveBag(bag);
      render();
    });
  });
}

function readBagFromForm() {
  const bag = [];
  BAG_CATEGORIES.forEach(cat => {
    const rows = document.querySelectorAll(`.bag-club-row[data-bag-cat="${cat.id}"]`);
    rows.forEach(row => {
      const brandSel = row.querySelector('.bag-brand-sel');
      const modelSel = row.querySelector('.bag-model-sel');
      const modelInput = row.querySelector('.bag-model-input');
      const otherInput = row.querySelector('.bag-model-other');
      let brand = brandSel?.value || '';
      let model = '';
      if (modelSel && modelSel.value && modelSel.value !== '__other') {
        model = modelSel.value;
      } else if (otherInput) {
        model = otherInput.value;
      } else if (modelInput) {
        model = modelInput.value;
      }
      if (brand || model) {
        bag.push({category: cat.id, brand, model});
      }
    });
  });
  return bag;
}

function saveBagFromForm() {
  const bag = readBagFromForm().filter(c => c.brand && c.model);
  saveBag(bag);
  setState({view:'mybag'});
}

function saveBagFromFormSilent() {
  const bag = readBagFromForm();
  saveBag(bag);
}

// ─── Community Moments ───────────────────────────────────────────────────────
function loadCommunityMoments() {
  try { return JSON.parse(localStorage.getItem('gearlog_moments')) || []; }
  catch { return []; }
}
function saveCommunityMoments(moments) {
  localStorage.setItem('gearlog_moments', JSON.stringify(moments));
}

function submitMoment() {
  const bag = loadBag();
  const club = bag[state.bagActiveClub] || bag[0];
  if (!club) return;

  const course = document.getElementById('moment-course')?.value?.trim();
  const date = document.getElementById('moment-date')?.value?.trim();
  const shot = document.getElementById('moment-shot')?.value?.trim();
  const note = document.getElementById('moment-note')?.value?.trim();

  if (!shot) { alert('Tell us what happened!'); return; }

  const id = `community--${(course||'unknown').toLowerCase().replace(/[^a-z0-9]+/g,'-')}--${date||'undated'}--${Date.now()}`;
  const entry = {
    id, tier:'PERSONAL', rank:null, era:'modern', lore:false,
    gearCategories:[club.category === 'fairway-wood' ? 'driver' : club.category],
    player:{name:'You', type:'amateur'},
    event:{name:course||'Unknown Course', course:course||'Unknown', date:date||new Date().toISOString().slice(0,10), round:null},
    conditions:{weather:'', surface:course||'', stakes:''},
    gear:[{category:club.category, brand:club.brand, model:club.model, item:`${club.brand} ${club.model}`, note:'', affiliateUrl:null, clubImageUrl:null}],
    shot: shot,
    note: note || '',
    community: true
  };

  // Add to community storage
  const moments = loadCommunityMoments();
  moments.unshift(entry);
  saveCommunityMoments(moments);

  // Also push into the live ENTRIES array so it shows up immediately
  ENTRIES.push(entry);

  setState({view:'mybag'});
}

// Load community moments into ENTRIES on boot
(function() {
  const moments = loadCommunityMoments();
  moments.forEach(m => {
    if (!ENTRIES.find(e => e.id === m.id)) ENTRIES.push(m);
  });
})();

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
